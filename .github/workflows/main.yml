name: CI-CD-Telegram-Bot-Docker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Archive project
        run: zip -r telegram_bot.zip . -x "*.git*" "__pycache__/*" "venv/*"

      - name: Copy files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "telegram_bot.zip"
          target: "~/"

      - name: Deploy bot on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            # Install unzip if missing
            if ! command -v unzip &> /dev/null
            then
              sudo apt-get update
              sudo apt-get install -y unzip
            fi

            # Install Docker if missing
            if ! command -v docker &> /dev/null
            then
              curl -fsSL https://get.docker.com | sh
              sudo usermod -aG docker $USER
              sudo systemctl enable docker
              sudo systemctl start docker
            fi

            # Prepare project directory
            rm -rf ~/telegram_bot
            mkdir -p ~/telegram_bot

            unzip -o ~/telegram_bot.zip -d ~/telegram_bot

            cd ~/telegram_bot

            # Create .env from GitHub Secrets
            cat > .env <<EOF
            BOT_TOKEN=${{ secrets.BOT_TOKEN }}
            EOF

            # Stop old container
            sudo docker stop telegram_bot_container || true
            sudo docker rm telegram_bot_container || true

            # Build image
            sudo docker build -t telegram_bot_image .

            # Run container
            sudo docker run -d \
              --name telegram_bot_container \
              --restart unless-stopped \
              --env-file .env \
              telegram_bot_image
