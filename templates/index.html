<!DOCTYPE html>
<html>
<head>
    <title>История Телеграм Бота</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #dddddd; padding: 10px; text-align: left; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>
    <h2>История обмена валют в боте</h2>
    <table>
        <tr>
            <th>ID операции</th>
            <th>Пользователь (ТГ Имя)</th>
            <th>Из валюты</th>
            <th>В валюту</th>
            <th>Сумма (Ввод)</th>
            <th>Сумма (Вывод)</th>
            <th>Время</th>
        </tr>
        {% for log in logs %}
        <tr>
            <td>{{ log.id }}</td>
            <td>{{ log.username }}</td>
            <td>{{ log.from_currency }}</td>
            <td>{{ log.to_currency }}</td>
            <td>{{ log.amount_in }}</td>
            <td>{{ log.amount_out }}</td>
            <td>{{ log.created_at }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
